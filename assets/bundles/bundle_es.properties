# planet
planet.volta-protocol-volta.name = Volta

# sectors
sector.volta-protocol-la-ultima-senal.name = La \u00daltima Se\u00f1al
sector.volta-protocol-la-ultima-senal.description = Una se\u00f1al autom\u00e1tica sigue transmitiendo desde las ruinas de Volta. Es la \u00faltima evidencia de que alguien sobrevivi\u00f3.

# blocks
    # distribution
block.volta-protocol-s-1-silver-conveyor.name = Cinta transportadora de plata
block.volta-protocol-s-1-silver-conveyor.description = Utiliza un recubrimiento de plata para reducir la fricción, permitiendo un transporte de recursos más fluido. Es ligeramente mas lento que la cinta de transporte de titanio

block.volta-protocol-s-2-palladium-magnetic-conductor.name = Riel Magnético de Paladio
block.volta-protocol-s-2-palladium-magnetic-conductor.description = Transporta contenedores de recursos mediante rieles magnéticos estabilizados con paladio. Diseñado para mantener un flujo constante en complejos industriales de alta capacidad.

block.volta-protocol-s-1a-palladium-duct.name = Conducto de paladio
block.volta-protocol-s-1a-palladium-duct.description = Transporta objetos rapidamente, pero no recibe objetos por los lados. 

block.volta-protocol-s-1b-palladium-duct-router.name = Router de paladio
block.volta-protocol-s-1b-palladium-duct-router.description = Puede distribuir objetos en 3 direcciones, funciona igual al de Erekir.

block.volta-protocol-s-1c-palladium-duct-bridge.name =  Puente conducto de paladio
block.volta-protocol-s-1c-palladium-duct-bridge.description = Transporta objetos sobre el terreno, posee mejor alcance en comparación al normal.

block.volta-protocol-s-1d-palladium-junction.name = Cruce de paladio
block.volta-protocol-s-1d-palladium-junction.description = Permite la interseccion de 2 conductos o cintas. Es ligeramente mas rapido que el cruce de Serpulo, pero mas caro.

        #Cargo-liquid
block.volta-protocol-liquid-cargo-loader.name = Centro de carga de liquidos
block.volta-protocol-liquid-cargo-loader.description = Construye drones Sifón para el transporte de liquidos hacia el receptor de liquidos compatible. [lightgray]Necesita 10 segundos para generar el dron Sifón[]

block.volta-protocol-liquid-cargo-unload-point.name = Centro de Descarga
block.volta-protocol-liquid-cargo-unload-point.description = Recibe líquidos transportados por drones Sifón. El líquido seleccionado determina la llegada del dron.

    #MCore
block.volta-protocol-mc-1a-modular-core.name = Core: Paradigm
block.volta-protocol-mc-1a-modular-core.description = Un núcleo altamente escalable. Permite la integración directa de modulos para adaptar la base a cualquier entorno hostil. Funciona como el procesador central del sistema Volta, coordinando el flujo de recursos, la seguridad y la autonomía del Kernel.

        #Modules
block.volta-protocol-mm-1a-module-basic.name = Módulo: basico
block.volta-protocol-mm-1a-module-basic.description = Contenedor básico que se conecta al núcleo modular. Da un pequeño bono de armadura.
block.volta-protocol-mm-1a-module-basic.details = Puede superar el límite de 6 módulos activos (Overflow), pero solo aporta capacidad extra.

block.volta-protocol-mm-1d-module-green.name = Módulo: Bio-Cell
block.volta-protocol-mm-1d-module-green.description = Módulo de bio-composite. Cura pasivamente el núcleo conectado a costa de reducir su armadura.
block.volta-protocol-mm-1d-module-green.details = [red]Incompatible con el módulo azul (aegesium).[] Si hay uno activo, la curación queda anulada. Necesita ser activado manualmente si se conecta a nucleos normales (se debe colocar cualquier tipo de bloque a su lado, algun container o vault u otro módulo).

block.volta-protocol-mm-1c-module-red.name = Módulo: Cañon de Pulso
block.volta-protocol-mm-1c-module-red.description = Módulo de paladio con torreta integrada. Consume ítems del núcleo como munición. Debilita la estructura del núcleo al instalarse.
block.volta-protocol-mm-1c-module-red.details = La torreta solo dispara cuando el módulo está en una ranura activa.

block.volta-protocol-mm-1e-module-blue.name = Módulo: Aegis Plate
block.volta-protocol-mm-1e-module-blue.description = Módulo de aegesium de alta densidad. Aumenta significativamente la armadura y los PV del núcleo.
block.volta-protocol-mm-1e-module-blue.details = [red]Anula la curación pasiva[] de módulos verdes mientras esté activo. Máximo 4 activos simultáneos.

block.volta-protocol-mm-1f-module-orange.name = Módulo: Volt-Generator
block.volta-protocol-mm-1f-module-orange.description = Módulo reactor de voltium. Genera energía al conectarse al núcleo, a costa de debilitar su estructura por la radiación.
block.volta-protocol-mm-1f-module-orange.details = Máximo 2 activos. Necesita ser activado manualmente si se conecta a nucleos normales (se debe colocar cualquier tipo de bloque a su lado, algun container, vault u otro módulo).

block.volta-protocol-mm-1b-module-silver.name = Módulo: Expanción estandar
block.volta-protocol-mm-1b-module-silver.description = Módulo multipropósito de plata. Aumenta la capacidad del núcleo con pequeños bonos de armadura y PV.
block.volta-protocol-mm-1b-module-silver.details = Puede superar el límite de 6 módulos activos (Overflow), pero solo aporta capacidad extra.

    # drills
block.volta-protocol-d0-a-silver-drill.name = Taladro de Rotación de Plata
block.volta-protocol-d0-a-silver-drill.description = Maquinaria de excavación rotativa para depósitos superficiales. Utiliza la flexibilidad térmica de la plata para mitigar el desgaste de las brocas durante operaciones de minería continua.

block.volta-protocol-d1-a-silver-arc-drill.name = Taladro de Arco de Plata
block.volta-protocol-d1-a-silver-arc-drill.description = Aprovecha la altísima conductividad de la plata para estabilizar un arco de plasma continuo. Capaz de desgastar las estructuras moleculares de los muros de mineral más densos sin sobrecalentar los componentes internos.

block.volta-protocol-d0-b-palladium-induction-drill.name = Taladro de Inducción de Paladio
block.volta-protocol-d0-b-palladium-induction-drill.description = Excavador masivo de acoplamiento terrestre. Su núcleo de inducción fragmenta los minerales a nivel molecular a escala industrial, exigiendo una inyección obligatoria de oxicloruro para disipar el calor remanente.

block.volta-protocol-d1-b-heavy-palladium-arc-drill.name = Taladro pesado de arco de paladio
block.volta-protocol-d1-b-heavy-palladium-arc-drill.description = La cúspide de la ingeniería de perforación de muros. Proyecta una llamarada de plasma tan masiva y destructiva que requiere un flujo constante de bio-plasma para evitar la fusión del bloque.

    # power
block.volta-protocol-c1-a-slag-turbine.name = Turbina de convección de Escoria
block.volta-protocol-c1-a-slag-turbine.description = Aprovecha el calor extremo de la escoria, además de agua que actúa como fluido de trabajo y refrigerante para generar electricidad. Puede ser usado junto al horno de copelación.

block.volta-protocol-c2-a-voltaic-turbine-condenser.name = Turbina Condensadora de Volta
block.volta-protocol-c2-a-voltaic-turbine-condenser.description = Utiliza plata para maximizar la extracción de energía del vapor de las grietas. El agua recuperada a partir del vapor es purificada para uso secundario.

    # production
block.volta-protocol-b1-a-copper-washer.name = Copper Washer
block.volta-protocol-b1-a-copper-washer.description = Procesa cobre mediante lavado a presión para extraer trazas de plata ocultas en el mineral.

block.volta-protocol-b1-b-cupellation-furnace.name = Horno de Copelación
block.volta-protocol-b1-b-cupellation-furnace.description = Separa trazas de plata de grandes cantidades de plomo mediante oxidación térmica. Libera escoria líquida como subproducto.

block.volta-protocol-b2-a-palladium-refinery.name = Refinería de Paladio
block.volta-protocol-b2-a-palladium-refinery.description = Refina plata y titanio mediante inducción de alta frecuencia para crear paladio puro. Requiere gran cantidad de energía.

block.volta-protocol-b2-b-palladium-catalytic-separator.name = Separador Catalítico de Paladio
block.volta-protocol-b2-b-palladium-catalytic-separator.description = Extrae paladio mediante cloración química utilizando oxicloruro. Mucho más eficiente que los métodos convencionales.

block.volta-protocol-b2-c-quantum-palladium-refinery.name = Refinería Cuántica de Paladio
block.volta-protocol-b2-c-quantum-palladium-refinery.description = Utiliza fluxphase para separar y sintetizar paladio a nivel molecular, logrando una producción masiva altamente eficiente.

block.volta-protocol-b3-a-oxychloride-chamber.name = Cámara de Cloración
block.volta-protocol-b3-a-oxychloride-chamber.description = Sintetiza Oxicloruro utilizando plata como catalizador para oxidar compuestos de chatarra en una solución acuosa.

block.volta-protocol-b3-b-bioplasma-centrifuge.name = Centrífuga de Bio-Plasma
block.volta-protocol-b3-b-bioplasma-centrifuge.description = Procesa metales nobles y silicio dentro de una base de oxicloruro para crear Bio-Plasma, un fluido con propiedades de reparación molecular.

block.volta-protocol-b4-a-phase-resonance-chamber.name = Cámara de Resonancia de Fase
block.volta-protocol-b4-a-phase-resonance-chamber.description = Somete a cargas masivas de presión y energía eléctrica las aleaciones de plata y paladio. El tejido de fase actúa como estabilizador interno, previniendo la degradación material durante la manufactura del Aegesium.

block.volta-protocol-b5-a-voltium-fusion-reactor.name = Reactor de Fusión Voltium
block.volta-protocol-b5-a-voltium-fusion-reactor.description = Reactor avanzado que fusiona torio y paladio mediante procesos energéticos inestables para producir Voltium.

block.volta-protocol-b6-a-synthesis-bioreactor.name = Biorreactor de Síntesis
block.volta-protocol-b6-a-synthesis-bioreactor.description = Biorreactor avanzado que utiliza bio-plasma y plastanio para sintetizar bio-compuestos de alta estabilidad.

block.volta-protocol-b7-a-phase-flow-reactor.name = Reactor de Flujo de Fase
block.volta-protocol-b7-a-phase-flow-reactor.description = Combina tejido de fase y silicio bajo una atmósfera reactiva de oxicloruro, catalizando la transición de los materiales sólidos hacia un estado de flujo.

    # torrets
block.volta-protocol-t1-tipe-1.name = Tipe-1
block.volta-protocol-t1-tipe-1.description = Primer prototipo de una torreta de disparo rapido con un alcance medio, requiere bastante municion para funcionar eficientemente.

block.volta-protocol-t2-doppio.name = Doppio
block.volta-protocol-t2-doppio.description = Torreta antiaérea de doble cañón de velocidad media con municion de alto explosivo.

block.volta-protocol-t2-staccato.name = Staccato
block.volta-protocol-t2-staccato.description = Torreta de defensa multipropósito desarrollada a partir de aleaciones de Aegesium. Sus cañones gemelos proporcionan una cobertura continua contra objetivos terrestres y aéreos.

block.volta-protocol-t3-ignite.name = Ignite
block.volta-protocol-t3-ignite.description = Lanza un chorro continuo de oxicloruro altamente oxidante. Prototipo del cauterier que no posee los estabilizadores necesarios para procesar bio-plasma. Ideal para defensas tempranas contra blindaje ligero.

block.volta-protocol-t4-cauterizer.name = Cauterizador
block.volta-protocol-t4-cauterizer.description =  Proyecta un rayo de bio-plasma de alta temperatura. Capaz de derretir blindaje pesado y, con la munición adecuada, reparar estructuras aliadas. Incluye sistemas de refrigeración avanzada.

block.volta-protocol-t5-gorgon.name = Gorgon
block.volta-protocol-t5-gorgon.description = Torreta experimental que utiliza bobinas de plata y paladio, convirtiendo munición sólida en plasma con distintos efectos. Requiere bastante refrigeración para funcionar eficientemente.

    # units
block.volta-protocol-u1-syrinx-hangar.name = Hangar Syrinx
block.volta-protocol-u1-syrinx-hangar.description = Instalación especializada en el ensamblaje de unidades químicas. Utiliza metales nobles y conductored para crear chasis resistentes a la corrosión.

block.volta-protocol-u2-syrinx-reconstructor.name = Reconstructor Syrinx
block.volta-protocol-u2-syrinx-reconstructor.description = Mejora aerodeslizadores Syrinx a versiones más avanzadas mediante utilizacion de oxicloruro y otros materiales.

block.volta-protocol-vp1-argent-assembler.name = Argent Assembler
block.volta-protocol-vp1-argent-assembler.description = Crea unidades terrestres especializadas en el manejo de la electricidad, utilizando la plata como material conductor.

block.volta-protocol-vp2-silver-reconstructor.name = Reconstructor de plata
block.volta-protocol-vp2-silver-reconstructor.description = Utiliza aleaciones cargadas de plata para reforzar el chasis y optimizar los sistemas de conducción electrica de la unidad Ion, transformándola en el modelo Valance.

block.volta-protocol-vp3-isotope-reconstructor.name = Reconstructor de convergencia
block.volta-protocol-vp3-isotope-reconstructor.description = Integra múltiples líneas de reconstrucción en una sola plataforma avanzada impulsada por tecnología isotópica y oxicloruro.

block.volta-protocol-vp4-tetractive-voltaic-reconstructor.name = Reconstructor Voltaico Tetractivo
block.volta-protocol-vp4-tetractive-voltaic-reconstructor.description = Fusiona componentes de Aegesium y núcleos de Voltium mediante una inmersión profunda en Oxicloruro y Bio-plasma. Convirtiendo a las unidades [cyan]Isotope[] en [accent]Radiolysis[] y [cyan]Alloster[] en [accent]Homeostasis[].

    # walls
block.volta-protocol-a0-silver-wall.name = Muro de plata
block.volta-protocol-a0-silver-wall.description = Refleja ocasionalmente proyectiles débiles gracias a su superficie pulida.

block.volta-protocol-a1-silver-wall-large.name = Muro de plata grande
block.volta-protocol-a1-silver-wall-large.description = Versión reforzada que mejora la probabilidad de desviar proyectiles.

block.volta-protocol-a2-palladium-wall.name = Muro de paladio
block.volta-protocol-a2-palladium-wall.description = Muro resistente al calor, que puede dañar a objetivos cercanos al ser impactado.

block.volta-protocol-a3-palladium-wall-large.name = Muro grande de paladio
block.volta-protocol-a3-palladium-wall-large.description = Versión reforzada del muro de palladio.

block.volta-protocol-a4-regenerative-wall.name = Muro Bio-regenerativo
block.volta-protocol-a4-regenerative-wall.description = Pared de Bio-Compuesto reforzada con paladio. [lightgray]Tras 3 segundos sin sufrir daños, activa su protocolo de autorreparación progresiva dependiendo del daño recibido.[]

block.volta-protocol-a5-regenerative-wall-large.name = Gran Muro Bio-regenerativo
block.volta-protocol-a5-regenerative-wall-large.description = Versión reforzada del muro de Bio-Compuesto, que mejora ligeramente la regeneración en función del daño recibido.

    #defenses
block.volta-protocol-vz-1a-assembler-relay.name = Relé de Construcción
block.volta-protocol-vz-1a-assembler-relay.description = Torreta pequeña con alcance medio que ayuda a construir y reconstruir estructuras. Requiere energia

block.volta-protocol-vz-2-repair-beacon.name = Baliza de Reparación
block.volta-protocol-vz-2-repair-beacon.description = repara estructuras cercanas, posee un poco menos de alcance y vida que el proyector de reparacion, pero puede reparar las estructuras mas rapidamente.

# items
item.volta-protocol-vw-1-silver.name = Plata
item.volta-protocol-vw-1-silver.description = Metal conductor usado en sistemas electrónicos y munición especial.

item.volta-protocol-vw-2-palladium.name = Paladio
item.volta-protocol-vw-2-palladium.description = Un metal raro, denso y resistente, con alta capacidad conductora lo que le permite ser utilizado en aleaciones y sistemas de energía avanzados.

item.volta-protocol-vw-3-aegesium.name = Aegesium
item.volta-protocol-vw-3-aegesium.description = Aleación metálica de alta densidad utilizada en estructuras y armamento avanzado.

item.volta-protocol-vw-4-bio-composite.name = Bio-Compuesto
item.volta-protocol-vw-4-bio-composite.description = Una matriz estructural híbrida de alta flexibilidad que Integra filamentos conductores de plata dentro de una base polimérica de plastanio, estabilizada con bio-plasma.

item.volta-protocol-vw-5-voltium.name = Voltium
item.volta-protocol-vw-5-voltium.description = A highly radioactive, energized synthetic isotope.

# liquids
liquid.volta-protocol-vx-1-oxychloride.name = Oxycloruro
liquid.volta-protocol-vx-1-oxychloride.description = Un agente oxidante altamente corrosivo obtenido mediante la cloración de óxidos metálicos.

liquid.volta-protocol-vx-2-bio-plasma.name = Bio-Plasma
liquid.volta-protocol-vx-2-bio-plasma.description = Fluido bioeléctrico regenerativo de alta densidad. Diseñado originalmente como un medio de cultivo y enfriamiento para reactores de paladio.

liquid.volta-protocol-vx-3-flux-phase.name = Fluxfase
liquid.volta-protocol-vx-3-flux-phase.description = Fluido energético altamente inestable que amplifica procesos industriales avanzados.

# status
status.volta-protocol-w0-a-fission.name = Fission
status.volta-protocol-w0-a-fission.description = Reacción en cadena que sobrecalienta los sistemas del objetivo disminuyendo la integridad funcional y estructural.

# Units
    # tanks
unit.volta-protocol-w1-a-ion.name = Ion
unit.volta-protocol-w1-a-ion.description = Tanque ligero de asalto equipado con sistemas eléctricos experimentales.

unit.volta-protocol-w1-b-valance.name = Valance
unit.volta-protocol-w1-b-valance.description = Tanque experimental de plata equipado con armamento láser y sistemas de descarga eléctrica.

unit.volta-protocol-w1-c-isotope.name = Isotope
unit.volta-protocol-w1-c-isotope.description = Tanque de asalto pesado equipado con un cañón láser estabilizado mediante paladio y drones de apoyo táctico. Su chasis reforzado le permite liderar ofensivas en zonas de alta resistencia.

unit.volta-protocol-w1-d-radiolysis.name = Radiolysis
unit.volta-protocol-w1-d-radiolysis.description = Plataforma de asedio pesado forjada con Aegesium. Su reactor estabilizado por oxicloruro alimenta un cañón láser doble y bahías de misiles capaces de dispersar agentes corrosivos sobre los enemigos.

    #syrinx
unit.volta-protocol-w2-a-syrinx-i.name = Syrinx-I
unit.volta-protocol-w2-a-syrinx-i.description = Aerodeslizador de apoyo equipado con un núcleo de autoreparación y cañones de descarga capaces de debilitar objetivos enemigos.

unit.volta-protocol-w2-b-syrinx-ii.name = Catalyst
unit.volta-protocol-w2-b-syrinx-ii.description = Aerodeslizador medio que utiliza concentrados de oxicloruro para amplificar sus campos de reparación y alimentar sus cañones.

unit.volta-protocol-w2-c-syrinx-iii.name = Alloster
unit.volta-protocol-w2-c-syrinx-iii.description = Unidad de soporte táctico equipada con reactores de paladio y bio-plasma, capaz de proyectar escudos y potenciar fuerzas aliadas.

unit.volta-protocol-w2-d-syrinx-iv.name = Homeostasis
unit.volta-protocol-w2-d-syrinx-iv.description = Unidad avanzada de soporte capaz de estabilizar estructuras aliadas mediante resonancia continua y proyección de escudos.

    #Liquid-cargo
unit.volta-protocol-w3-a-sifon.name = Sifón
unit.volta-protocol-w3-a-sifon.description = Dron especializado en el transporte rapido de liquidos. (transportan 120 unidades de liquido por viaje)
    
    #Core-Drone
unit.volta-protocol-w3-b-kernel-drone.name = Kernel
unit.volta-protocol-w3-b-kernel-drone.description = Dron multiproposito que defiende al Core: Paradigm que puede construir y reparar estructuras aliadas.

# stats
stat.voltaprotocol-regen-info = (Regeneración autónoma del muro)
stat.vpmoduleslots = Máx. activos al mismo tiempo
stat.vpmoduleoverflow = Funcion Overflow 
