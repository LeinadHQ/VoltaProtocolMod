# planet
planet.volta-protocol-volta.name = Volta

# sectors
sector.volta-protocol-la-ultima-senal.name = The Last Signal.
sector.volta-protocol-la-ultima-senal.description = An automated signal keeps transmitting from the ruins of Volta. It is the last evidence that someone survived.

# blocks
    # distribution
block.volta-protocol-s-1-silver-conveyor.name = Cinta transportadora de plata
block.volta-protocol-s-1-silver-conveyor.description = Utiliza un recubrimiento de plata para reducir la fricción, permitiendo un transporte de recursos más fluido. Es ligeramente mas lento que la cinta de transporte de titanio

Block.volta-protocol-s-2-palladium-magnetic-conductor.name = Palladium Magnetic Rail
Block.volta-protocol-s-2-palladium-magnetic-conductor.description = Transports resource containers via palladium-stabilized magnetic rails. Designed to maintain a constant flow in high-capacity industrial complexes.

block.volta-protocol-s-1a-palladium-duct.name = Palladium duct
block.volta-protocol-s-1a-palladium-duct.description = Transports items quickly, but does not receive objects from the sides. 

block.volta-protocol-s-1b-palladium-duct-router.name = Palladium Duct Router
block.volta-protocol-s-1b-palladium-duct-router.description = Can distribute items in 3 directions; works the same as the one in Erekir.

block.volta-protocol-s-1c-palladium-duct-bridge.name =  Palladium Duct Bridge
block.volta-protocol-s-1c-palladium-duct-bridge.description = Transports objects over terrain; has a longer range than the standard version.

block.volta-protocol-s-1d-palladium-junction.name = Palladium Junction
block.volta-protocol-s-1d-palladium-junction.description = Allows two ducts or conveyor belts to intersect. It is slightly faster than the Serpulo junction, but more expensive.

        #Cargo-liquid
block.volta-protocol-liquid-cargo-loader.name = Liquid Cargo Center
block.volta-protocol-liquid-cargo-loader.description = Builds Siphon drones to transport liquids to a compatible liquid receiver. [lightgray]It takes 10 seconds to build a Sifon drone.[]

block.volta-protocol-liquid-cargo-unload-point.name = Unloading Center
block.volta-protocol-liquid-cargo-unload-point.description = Receives liquids transported by Siphon drones. The selected liquid determines which drone arrives.

    #MCore
block.volta-protocol-mc-1a-modular-core.name = Core: Paradigm
block.volta-protocol-mc-1a-modular-core.description = A highly scalable core. It allows for the direct integration of modules to adapt the base to any hostile environment. It functions as the central processor of the Volta system, coordinating resource flow, security, and kernel autonomy.
        
        #Modules
block.volta-protocol-mm-1a-module-basic.name = Module: Basic
block.volta-protocol-mm-1a-module-basic.description = Basic container that connects to the modular core. Provides a small armor bonus.
block.volta-protocol-mm-1a-module-basic.details = It can exceed the limit of 6 active modules, but only provides extra capacity.

block.volta-protocol-mm-1d-module-green.name = Module: Bio-Cell
block.volta-protocol-mm-1d-module-green.description = Bio-composite module. Passively heals the connected core at the cost of reducing its armor.
block.volta-protocol-mm-1d-module-green.details = [red]Incompatible with the blue module (aegesium).[] If one is active, healing is disabled. It needs to be activated manually if connected to standard Nucleos (you must place any type of block next to it, such as a container, vault, or other module).

block.volta-protocol-mm-1c-module-red.name = Module: Pulse Cannon
block.volta-protocol-mm-1c-module-red.description = Palladium module with integrated turret. Consumes core items as ammunition (palladium). Weakens the core’s structure upon installation.
block.volta-protocol-mm-1c-module-red.details = The turret only fires when the module is in an active slot.

block.volta-protocol-mm-1e-module-blue.name = Module: Aegis Plate
block.volta-protocol-mm-1e-module-blue.description = High-density aegesium module. Significantly increases the core's armor and HP.
block.volta-protocol-mm-1e-module-blue.details = [red]Overrides the passive healing[] of green modules while active. Maximum of 4 active simultaneously.

block.volta-protocol-mm-1f-module-orange.name = Module: Volt-Generator
block.volta-protocol-mm-1f-module-orange.description = Voltium reactor module. Generates energy when connected to the core, at the cost of weakening its structure due to radiation.
block.volta-protocol-mm-1f-module-orange.details = Maximum of 2 active modules. It needs to be activated manually if connected to standard Nucleos (you must place any type of block next to it, such as a container, vault, or other module).

block.volta-protocol-mm-1b-module-silver.name = Module: Expansion
block.volta-protocol-mm-1b-module-silver.description = Multipurpose silver module. Increases the core’s capacity with small bonuses to armor and HP.
block.volta-protocol-mm-1b-module-silver.details = Can exceed the limit of 6 active modules (Overflow), but only provides extra capacity.

    # drills
block.volta-protocol-d0-a-silver-drill.name = Silver Rotary Drill
block.volta-protocol-d0-a-silver-drill.description = Rotary excavation machinery for surface deposits. Uses the thermal flexibility of silver to mitigate drill bit wear during continuous mining operations.

block.volta-protocol-d1-a-silver-arc-drill.name = Silver Arc Drill
block.volta-protocol-d1-a-silver-arc-drill.description = Harnesses the extremely high conductivity of silver to stabilize a continuous plasma arc. Capable of wearing down the molecular structures of the densest ore walls without overheating internal components.

block.volta-protocol-d0-b-palladium-induction-drill.name = Palladium Induction Drill
block.volta-protocol-d0-b-palladium-induction-drill.description = Massive ground-coupling excavator. Its induction core fragments minerals at a molecular level on an industrial scale, requiring a mandatory injection of oxychloride to dissipate residual heat.

block.volta-protocol-d1-b-heavy-palladium-arc-drill.name = Heavy Palladium Arc Drill
block.volta-protocol-d1-b-heavy-palladium-arc-drill.description = The pinnacle of wall-drilling engineering. Projects a plasma flare so massive and destructive that it requires a constant flow of bio-plasma to prevent block meltdown.
   
    # power
block.volta-protocol-c1-a-slag-turbine.name = Slag Convection Turbine
block.volta-protocol-c1-a-slag-turbine.description = It harnesses the extreme heat of the slag, along with water, which acts as both a working fluid and a coolant, to generate electricity. It can be used in conjunction with a cupellation furnace.

block.volta-protocol-c2-a-voltaic-turbine-condenser.name = Volta condensing turbine
block.volta-protocol-c2-a-voltaic-turbine-condenser.description = It uses silver to maximize energy recovery from the steam in the vents. The water recovered from the steam is purified for secondary use.
    #production
block.volta-protocol-b1-a-copper-washer.name = Copper Washer
block.volta-protocol-b1-a-copper-washer.description = It processes copper using pressure washing to extract traces of silver hidden in the ore.

Block.volta-protocol-b1-b-cupellation-furnace.name = Copellation Furnace
Block.volta-protocol-b1-b-cupellation-furnace.description = It separates traces of silver from large quantities of lead through thermal oxidation. This process produces liquid slag as a byproduct.

block.volta-protocol-b2-a-palladium-refinery.name = Palladium Refinery
block.volta-protocol-b2-a-palladium-refinery.description = It refines silver and titanium using high-frequency induction to produce pure palladium. This process requires a large amount of energy.

block.volta-protocol-b2-b-palladium-catalytic-separator.name = Palladium Catalytic Separator
block.volta-protocol-b2-b-palladium-catalytic-separator.description = It extracts palladium through chemical chlorination using oxychloride. This method is much more efficient than conventional methods.

block.volta-protocol-b2-c-quantum-palladium-refinery.name = Quantum Palladium Refinery
block.volta-protocol-b2-c-quantum-palladium-refinery.description = It uses flux-phase technology to isolate and synthesize palladium at the molecular level, enabling highly efficient large-scale production.

Block.volta-protocol-b3-a-oxychloride-chamber.name = Oxychloride Chamber
Block.volta-protocol-b3-a-oxychloride-chamber.description = Synthesize oxychloride using silver as a catalyst to oxidize scrap compounds in an aqueous solution.

block.volta-protocol-b3-b-bioplasma-centrifuge.name = Bioplasma Centrifuge
block.volta-protocol-b3-b-bioplasma-centrifuge.description = It processes precious metals and silicon within an oxychloride base to create Silver Bio-Plasma, a fluid with repair properties.

block.volta-protocol-b4-a-phase-resonance-chamber.name = Phase Resonance Chamber
block.volta-protocol-b4-a-phase-resonance-chamber.description = It subjects silver and palladium alloys to massive loads of pressure and electrical energy. The phase structure acts as an internal stabilizer, preventing material degradation during the manufacture of Aegesium.

block.volta-protocol-b5-a-voltium-fusion-reactor.name = Voltium Fusion Reactor
block.volta-protocol-b5-a-voltium-fusion-reactor.description = An advanced reactor that fuses thorium and palladium through unstable energetic processes to produce Voltium.

block.volta-protocol-b6-a-synthesis-bioreactor.name = Synthesis Bioreactor
block.volta-protocol-b6-a-synthesis-bioreactor.description = An advanced bioreactor that uses bio-plasma and plastanium to synthesize highly stable bio-composites.

block.volta-protocol-b7-a-phase-flow-reactor.name = Phase Flow Reactor
block.volta-protocol-b7-a-phase-flow-reactor.description = It combines phase-change material and silicon in a reactive oxychloride atmosphere, catalyzing the transition of the solid materials into a plasma flow state.

    # torrets
block.volta-protocol-t1-tipe-1.name = Tipe-1
block.volta-protocol-t1-tipe-1.description = First prototype of a medium-range rapid-fire turret; it requires a significant amount of ammunition to operate efficiently.

block.volta-protocol-t2-doppio.name = Doppio
block.volta-protocol-t2-doppio.description = Medium-speed twin-gun anti-aircraft turret equipped with high-explosive ammunition.

block.volta-protocol-t2-staccato.name = Staccato
block.volta-protocol-t2-staccato.description = A multipurpose defense turret developed from advanced Aegesium alloys. Its twin cannons deliver sustained firepower against both ground and airborne threats.

block.volta-protocol-t3-ignite.name = Ignite
block.volta-protocol-t3-ignite.description = It fires a continuous stream of highly oxidizing oxychloride. A prototype cauterizer that lacks the stabilizers needed to process bio-plasma. Ideal for early-stage defense against light armor.

block.volta-protocol-t4-cauterizer.name = Cauterizer
block.volta-protocol-t4-cauterizer.description = It fires a high-temperature bio-plasma beam. It can melt heavy armor and, with the right ammunition, repair allied structures. It includes advanced cooling systems.

block.volta-protocol-t5-gorgon.name = Gorgon
block.volta-protocol-t5-gorgon.description = An experimental turret that uses silver and palladium coils to convert solid ammunition into plasma with various effects. It requires significant cooling to operate efficiently.
    
    # units
block.volta-protocol-u1-syrinx-hangar.name = Syrinx Hangar
block.volta-protocol-u1-syrinx-hangar.description = A facility specializing in the assembly of chemical processing units. It uses noble and conductive metals to create corrosion-resistant frames.

block.volta-protocol-u2-syrinx-reconstructor.name = Syrinx Reconstructor
block.volta-protocol-u2-syrinx-reconstructor.description = Upgrade Syrinx hovercraft to more advanced versions by using oxychloride and other materials.

block.volta-protocol-vp1-argent-assembler.name = Argent Assembler
block.volta-protocol-vp1-argent-assembler.description = Create ground units specialized in handling electricity, using silver as a conductor.

block.volta-protocol-vp2-silver-reconstructor.name = Silver Reconstructor
block.volta-protocol-vp2-silver-reconstructor.description = It uses silver-infused alloys to reinforce the chassis and optimize the Ion units electric drive systems, transforming it into the Valance model.

block.volta-protocol-vp3-isotope-reconstructor.name = Convergence Reconstructor
block.volta-protocol-vp3-isotope-reconstructor.description = It integrates multiple reconstruction methods into a single advanced platform powered by isotopic and oxychloride technology.

block.volta-protocol-vp4-tetractive-voltaic-reconstructor.name = Tetractive Voltaic Reconstructor
block.volta-protocol-vp4-tetractive-voltaic-reconstructor.description = It merges Aegesium components and Voltium cores through deep immersion in oxychloride and bioplasma. This transforms the [cyan]Isotope[] units into [accent]Radiolysis[] and the [cyan]Alloster[] units into [accent]Homeostasis[].

    # walls
block.volta-protocol-a0-silver-wall.name = Silver Wall
block.volta-protocol-a0-silver-wall.description = Its polished surface occasionally deflects weak projectiles.

block.volta-protocol-a1-silver-wall-large.name = Large Silver Wall
block.volta-protocol-a1-silver-wall-large.description = A reinforced version that increases the chance of deflecting projectiles.

block.volta-protocol-a2-palladium-wall.name = Palladium Wall
block.volta-protocol-a2-palladium-wall.description = A heat-resistant wall that can damage nearby targets when struck.

block.volta-protocol-a3-palladium-wall.name = Large Palladium Wall
block.volta-protocol-a3-palladium-wall.description = Reinforced version of the Palladian wall.

block.volta-protocol-a4-regenerative-wall.name = Regenerative Wall
block.volta-protocol-a4-regenerative-wall.description = Bio-composite wall reinforced with palladium. [lightgray]After 3 seconds without sustaining damage, it activates its progressive self-repair protocol based on the damage sustained.[]

block.volta-protocol-a5-regenerative-wall-large.name = Large Regenerative Wall
block.volta-protocol-a5-regenerative-wall-large.description = A reinforced version of the Bio-Composite wall, which slightly improves regeneration depending on the damage sustained.

    #defenses
block.volta-protocol-vz-1a-assembler-relay.name = Assembler Relay
block.volta-protocol-vz-1a-assembler-relay.description = A small turret with medium range that helps build and rebuild structures. Requires energy

block.volta-protocol-vz-2-repair-beacon.name = Repair Beacon
block.volta-protocol-vz-2-repair-beacon.description = Repairs nearby structures; it has slightly less range and health than the repair projector, but it can repair structures more quickly.

# items
item.volta-protocol-vw-1-silver.name = Silver
item.volta-protocol-vw-1-silver.description = A conductive metal used in electronic systems and specialized ammunition.

item.volta-protocol-vw-2-palladium.name = Palladium
item.volta-protocol-vw-2-palladium.description = A rare, dense, and strong metal with high electrical conductivity, making it suitable for use in alloys and advanced energy systems.

item.volta-protocol-vw-3-aegesium.name = Aegesium
item.volta-protocol-vw-3-aegesium.description = A high-density metal alloy used in advanced structures and weaponry.

item.volta-protocol-vw-4-bio-composite.name = Bio-Composite
item.volta-protocol-vw-4-bio-composite.description = A highly flexible hybrid structural matrix that integrates silver conductive filaments into a plastanium polymer base, stabilized with bio-plasma.

item.volta-protocol-vw-5-voltium.name = Voltium
item.volta-protocol-vw-5-voltium.description = Isótopo sintético altamente radiactivo y energizado.

# liquids
liquid.volta-protocol-oxychloride.name = Oxicloruro
liquid.volta-protocol-oxychloride.description = A highly corrosive oxidizing agent obtained by the chlorination of metal oxides.

liquid.volta-protocol-vx-2-bio-plasma.name = Bio-Plasma
liquid.volta-protocol-vx-2-bio-plasma.description = High-density regenerative bioelectric fluid. Originally designed as a culture and cooling medium for palladium reactors.

liquid.volta-protocol-vx-3-flux-phase.name = Fluxfase
liquid.volta-protocol-vx-3-flux-phase.description = A highly unstable energy fluid that enhances advanced industrial processes.

# status
status.volta-protocol-w0-a-fission.name = Fission
status.volta-protocol-w0-a-fission.description = A chain reaction that overheats the targets systems, compromising their functional and structural integrity.

# Units
    # Tanks
unit.volta-protocol-w1-a-ion.name = Ion
unit.volta-protocol-w1-a-ion.description = Light assault tank equipped with experimental electrical systems.

unit.volta-protocol-w1-b-valance.name = Valance
unit.volta-protocol-w1-b-valance.description = Experimental silver tank equipped with laser weapons and electric discharge systems.

unit.volta-protocol-w1-c-isotope.name = Isotope
unit.volta-protocol-w1-c-isotope.description = A heavy assault tank equipped with a palladium-stabilized laser cannon and tactical support drones. Its reinforced chassis allows it to lead offensives in areas of heavy resistance.

unit.volta-protocol-w1-d-radiolysis.name = Radiolysis
unit.volta-protocol-w1-d-radiolysis.description = A heavy siege platform forged from Aegesium. Its oxychloride-stabilized reactor powers a dual laser cannon and missile bays capable of dispersing corrosive agents over enemy forces.

    # Syrinx
unit.volta-protocol-w2-a-syrinx-i.name = Syrinx-I
unit.volta-protocol-w2-a-syrinx-i.description = A support hovercraft equipped with a self-repairing core and cannons capable of neutralizing enemy targets.

unit.volta-protocol-w2-b-syrinx-ii.name = Catalyst
unit.volta-protocol-w2-b-syrinx-ii.description = A medium hovercraft that uses oxychloride concentrates to amplify its repair fields and power its cannons.

unit.volta-protocol-w2-c-syrinx-iii.name = Alloster
unit.volta-protocol-w2-c-syrinx-iii.description = A tactical support unit equipped with palladium reactors and bio-plasma, capable of projecting shields and bolstering allied forces.

unit.volta-protocol-w2-d-syrinx-iv.name = Homeostasis
unit.volta-protocol-w2-d-syrinx-iv.description = An advanced support unit capable of stabilizing allied structures through continuous resonance and the projection of shields.

    #Liquid-cargo
unit.volta-protocol-w3-a-sifon.name = Sifon
unit.volta-protocol-w3-a-sifon.description = A drone designed for the rapid transport of liquids. (They transport 120 units of liquid per trip)

    #Core-Drone
unit.volta-protocol-w3-b-kernel-drone.name = Kernel
unit.volta-protocol-w3-b-kernel-drone.description = A multipurpose drone that defends the Core: Paradigm and can build and repair allied structures.

# stats
stat.voltaprotocol-regen-info = (Regeneración autónoma del muro)
stat.vpmoduleslots = Max. active at the same time
stat.vpmoduleoverflow = Overflow function 
